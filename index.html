<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2MHS Welcome Experience</title>
  <style>
    :root{
      --bg:#08141b; --card:#10232f; --card2:#0c1b24; --text:#fff7ea; --muted:#a9bac2;
      --teal:#079b9b; --magenta:#c52a73; --gold:#d6b36a; --ok:#64d89a; --warn:#ffd166; --bad:#ff6b6b;
      --border:rgba(255,255,255,.14); --radius:24px; --shadow:0 28px 80px rgba(0,0,0,.36);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 18% 0%,rgba(7,155,155,.25),transparent 32%),radial-gradient(circle at 100% 12%,rgba(197,42,115,.20),transparent 30%),var(--bg);color:var(--text);min-height:100vh}
    .wrap{width:min(1120px,94vw);margin:0 auto;padding:28px 0 56px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
    .brand{display:flex;align-items:center;gap:14px}.logo{width:50px;height:50px;border-radius:17px;background:linear-gradient(135deg,var(--teal),var(--magenta));display:grid;place-items:center;font-weight:900;box-shadow:var(--shadow)}
    h1,h2,h3{margin:0}h1{font-size:28px}h2{font-size:34px;line-height:1.08}.sub,.desc{color:var(--muted);line-height:1.5}.sub{font-size:14px}.desc{font-size:15px}
    .lang{display:flex;gap:8px;flex-wrap:wrap}.lang button,.btn{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);padding:10px 15px;border-radius:999px;cursor:pointer;font-weight:750}.lang button.active,.btn.primary{background:linear-gradient(135deg,var(--teal),var(--magenta));border:0}.btn:disabled{opacity:.45;cursor:not-allowed}
    .steps{display:flex;gap:8px;margin:18px 0 22px}.pill{height:8px;flex:1;border-radius:999px;background:rgba(255,255,255,.12)}.pill.on{background:linear-gradient(90deg,var(--teal),var(--magenta))}
    .grid{display:grid;grid-template-columns:1.03fr .97fr;gap:18px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}.hero{padding:36px}
    .field{margin:15px 0}.field label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}input,select,textarea{width:100%;background:rgba(0,0,0,.24);border:1px solid var(--border);border-radius:15px;color:var(--text);padding:13px 14px;font-size:16px}select option{color:#111}textarea{min-height:92px;resize:vertical}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.hidden{display:none!important}.notice{border-left:4px solid var(--warn);background:rgba(255,209,102,.10);padding:12px;border-radius:14px;color:#fff3c2;margin:12px 0}.notice.ok{border-left-color:var(--ok);background:rgba(100,216,154,.10);color:#dfffee}.notice.danger{border-left-color:var(--bad);background:rgba(255,107,107,.12);color:#ffdada}
    .booking{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.mini{background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:16px;padding:13px}.mini b{display:block;font-size:18px}.mini span{color:var(--muted);font-size:12px}
    .wallet{background:linear-gradient(135deg,rgba(7,155,155,.22),rgba(197,42,115,.18));border:1px solid rgba(255,255,255,.18);border-radius:21px;padding:18px;margin-top:18px}.wallet .big{font-size:42px;font-weight:900}
    .summary-line{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}.summary-line span:first-child{color:var(--muted)}
    .packgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.pack{position:relative;border:1px solid var(--border);border-radius:21px;padding:18px;background:rgba(0,0,0,.17);cursor:pointer;transition:.18s}.pack:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.30)}.pack.selected{outline:2px solid var(--teal);background:rgba(7,155,155,.13)}.pack.disabled{opacity:.42;cursor:not-allowed;filter:grayscale(.35)}
    .icon{width:38px;height:38px;color:var(--gold);margin-bottom:9px}.icon svg{width:38px;height:38px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.credits{position:absolute;right:14px;top:14px;background:rgba(255,255,255,.10);padding:6px 10px;border-radius:999px;font-weight:900}.money{background:rgba(100,216,154,.15);border:1px solid rgba(100,216,154,.30);color:#dcffe9;padding:6px 10px;border-radius:999px;font-weight:900;display:inline-block;margin-top:8px}
    .checks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.check{display:flex;gap:8px;align-items:center;background:rgba(0,0,0,.14);border:1px solid var(--border);border-radius:12px;padding:10px}.check input{width:auto}
    .operator{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;background:#071018;border-radius:16px;padding:16px;white-space:pre-wrap;color:#d9f7f2}.footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center}
    @media(max-width:850px){.grid,.booking,.packgrid,.checks{grid-template-columns:1fr}.hero h2{font-size:30px}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo">2M</div><div><h1>2MHS Welcome Experience</h1><div class="sub" data-i="tagline"></div></div></div>
    <div class="lang"><button data-lang="it" class="active">IT</button><button data-lang="en">EN</button><button data-lang="pt">PT</button><button data-lang="tr">TR</button></div>
  </div>
  <div class="steps"><div class="pill on" id="p1"></div><div class="pill" id="p2"></div><div class="pill" id="p3"></div><div class="pill" id="p4"></div></div>

  <section id="step-code" class="grid">
    <div class="card hero">
      <h2 data-i="welcomeTitle"></h2>
      <p class="desc" data-i="welcomeText"></p>
      <div class="field"><label data-i="codeLabel"></label><input id="bookingCode" autocomplete="off" /></div>
      <div class="actions"><button class="btn primary" id="loadBooking" data-i="continue"></button></div>
      <div id="loadMsg" class="notice hidden"></div>
    </div>
    <div class="card">
      <h3 data-i="privacyTitle"></h3>
      <p class="desc" data-i="privacyText"></p>
      <div class="notice ok" data-i="privacyNote"></div>
    </div>
  </section>

  <section id="step-booking" class="hidden">
    <div class="card hero">
      <h2><span data-i="hello"></span> <span id="guestName">—</span></h2>
      <p class="desc" id="apartment">—</p>
      <div class="booking">
        <div class="mini"><span>Check-in</span><b id="ci">—</b></div>
        <div class="mini"><span>Check-out</span><b id="co">—</b></div>
        <div class="mini"><span data-i="nights"></span><b id="nights">—</b></div>
        <div class="mini"><span data-i="amount"></span><b id="amount">—</b></div>
      </div>
      <div class="wallet"><div class="sub" data-i="walletLabel"></div><div class="big"><span id="creditsTotal">0</span> Credits</div><div class="desc" data-i="walletText"></div></div>
      <div class="actions"><button class="btn" onclick="go(1)" data-i="back"></button><button class="btn primary" onclick="go(3)" data-i="chooseBenefits"></button></div>
    </div>
  </section>

  <section id="step-packs" class="grid hidden">
    <div class="card">
      <h2 data-i="chooseTitle"></h2><p class="desc" data-i="chooseText"></p>
      <div class="wallet">
        <div class="summary-line"><span data-i="available"></span><b><span id="walletAvailable">0</span></b></div>
        <div class="summary-line"><span data-i="used"></span><b><span id="walletUsed">0</span></b></div>
        <div class="summary-line"><span data-i="remaining"></span><b><span id="walletRemaining">0</span></b></div>
        <div class="summary-line"><span data-i="extraDue"></span><b>€ <span id="extraDueValue">0</span></b></div>
      </div>
      <div id="packGrid" class="packgrid" style="margin-top:18px"></div>
      <div id="packMsg" class="notice hidden"></div>
    </div>
    <div class="card"><h2 data-i="customize"></h2><p class="desc" data-i="customizeText"></p><div id="customFields"><p class="desc" data-i="selectFirst"></p></div><div class="actions"><button class="btn" onclick="go(2)" data-i="back"></button><button class="btn primary" id="toPrefs" data-i="continue"></button></div></div>
  </section>

  <section id="step-health" class="grid hidden">
    <div class="card"><h2 data-i="healthTitle"></h2><p class="desc" data-i="healthText"></p><div id="allergyBox" class="checks"></div><div class="field"><label data-i="notes"></label><textarea id="notes"></textarea></div></div>
    <div class="card"><h2 data-i="summary"></h2><div id="summaryBox"></div><div class="actions"><button class="btn" onclick="go(3)" data-i="back"></button><button class="btn primary" id="confirmBtn" data-i="confirm"></button></div></div>
  </section>

  <section id="step-done" class="hidden">
    <div class="card hero"><h2 data-i="doneTitle"></h2><p class="desc" data-i="doneText"></p><div id="operatorCard" class="operator hidden"></div></div>
  </section>

  <div class="footer">2MHS — Hospitality System</div>
</div>

 sweet:{it:'Dolce',en:'Sweet item',pt:'Doce',tr:'Tatlı',opts:{it:['Cioccolato','Praline','Biscotti farciti','Biscotti classici'],en:['Chocolate','Pralines','Filled biscuits','Classic biscuits'],pt:['Chocolate','Pralinés','Bolachas recheadas','Bolachas clássicas'],tr:['Çikolata','Pralin','Dolgulu bisküvi','Klasik bisküvi']}},
 pasta:{it:'Pasta',en:'Pasta',pt:'Massa',tr:'Makarna',opts:{it:['Spaghetti','Penne'],en:['Spaghetti','Penne'],pt:['Spaghetti','Penne'],tr:['Spaghetti','Penne']}},
 sauce:{it:'Sugo',en:'Sauce',pt:'Molho',tr:'Sos',opts:{it:['Pomodoro classico','Basilico','Arrabbiata'],en:['Classic tomato','Basil','Arrabbiata'],pt:['Tomate clássico','Manjericão','Arrabbiata'],tr:['Klasik domates','Fesleğen','Arrabbiata']}},
 luggage:{it:'Bagagli',en:'Luggage',pt:'Bagagem',tr:'Bagaj',opts:{it:['1','2','3 o più'],en:['1','2','3 or more'],pt:['1','2','3 ou mais'],tr:['1','2','3 veya daha fazla']}}
};
const packs=[
 {id:'soft',credits:35,type:'basic',fields:['sparklingDrink','sparklingDrink','juice','aperitifNA']},
 {id:'breakfast',credits:65,type:'basic',fields:['milk','juice','bakery','biscuits','spread']},
 {id:'aperitivo',credits:75,type:'premium',fields:['drinkMain','sweet']},
 {id:'grocery',credits:60,type:'premium',fields:['pasta','sauce']},
 {id:'transfer_centrale',credits:0,type:'transfer',fields:['luggage'],confirm:true},
 {id:'transfer_linate',credits:0,type:'transfer',fields:['luggage'],confirm:true}
];
const allergies={it:['Nessuna','Glutine','Lattosio','Frutta a guscio','Arachidi','Uova','Soia','Vegano','Vegetariano','Altro'],en:['None','Gluten','Lactose','Tree nuts','Peanuts','Eggs','Soy','Vegan','Vegetarian','Other'],pt:['Nenhuma','Glúten','Lactose','Frutos secos','Amendoim','Ovos','Soja','Vegan','Vegetariano','Outro'],tr:['Yok','Gluten','Laktoz','Kuruyemiş','Yer fıstığı','Yumurta','Soya','Vegan','Vejetaryen','Diğer']};
let lang='it',booking=null,selected=new Set(),prefs={};
function tr(k){return (i18n[lang]&&i18n[lang][k])||i18n.it[k]||k}
function translate(){document.documentElement.lang=lang;document.querySelectorAll('[data-i]').forEach(e=>e.textContent=tr(e.dataset.i));document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));bookingCode.placeholder=lang==='it'?'es. OMUR-20260706':lang==='en'?'e.g. OMUR-20260706':lang==='pt'?'ex. OMUR-20260706':'örn. OMUR-20260706';renderPacks();renderCustom();renderAllergies();if(booking)fillBooking(false)}
document.querySelectorAll('.lang button').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;translate()});
function go(n){['code','booking','packs','health','done'].forEach((id,i)=>document.getElementById('step-'+id).classList.toggle('hidden',i+1!==n));[p1,p2,p3,p4].forEach((p,i)=>p.classList.toggle('on',i<n));if(n===4)renderSummary()}
function normalizeBooking(data){return {code:data.code||data.bookingCode||data['Booking Code'],guest:data.guest||data.guestName||[data.firstName||data['Guest First Name'],data.lastName||data['Guest Last Name']].filter(Boolean).join(' '),apartment:data.apartment||data['Apartment'],checkin:data.checkin||data['Check-in'],checkout:data.checkout||data['Check-out'],nights:Number(data.nights||data['Nights']||0),amount:Number(data.amount||data.price||data['Price EUR']||0),credits:Number(data.totalCredits||data.totalWelcomeCredits||data['Total Welcome Credits']||data.credits||data['Welcome Credits']||0),language:data.language||data['Language']||lang};}
function creditsFor(b){if(Number.isFinite(Number(b.credits))&&Number(b.credits)>0)return Number(b.credits);let c=0,n=Number(b.nights||0);if(n>=14&&n<=29)c=75;else if(n>=30&&n<=44)c=100;else if(n>=45&&n<=59)c=130;else if(n>=60)c=175;return c}
async function fetchBooking(code){const r=await fetch(CONFIG.API_ENDPOINT+'?code='+encodeURIComponent(code));if(!r.ok)throw new Error(tr('bookingError'));const data=await r.json();if(data.error)throw new Error(data.error);return normalizeBooking(data)}
loadBooking.onclick=()=>load();
async function load(){const msg=loadMsg;msg.className='notice hidden';try{const code=bookingCode.value.trim();if(!code)throw new Error(tr('insertCode'));booking=await fetchBooking(code);booking.credits=creditsFor(booking);if(['it','en','pt','tr'].includes(String(booking.language||'').toLowerCase())){lang=String(booking.language).toLowerCase();}fillBooking();translate();go(2)}catch(e){msg.textContent=e.message;msg.className='notice danger'}}
function fmt(s){try{return new Date(s+'T00:00:00').toLocaleDateString(lang==='en'?'en-GB':lang==='pt'?'pt-PT':lang==='tr'?'tr-TR':'it-IT',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return s||'—'}}
function fillBooking(doRender=true){guestName.textContent=booking.guest||'—';apartment.textContent=booking.apartment||'—';ci.textContent=fmt(booking.checkin);co.textContent=fmt(booking.checkout);nights.textContent=booking.nights||'—';amount.textContent='€ '+Number(booking.amount||0).toFixed(2);creditsTotal.textContent=booking.credits;if(doRender)renderPacks()}
function selectedPacks(){return [...selected].map(id=>packs.find(p=>p.id===id)).filter(Boolean)}
function hasTransfer(){return selectedPacks().some(p=>p.type==='transfer')}
function nonTransferPacks(){return selectedPacks().filter(p=>p.type!=='transfer')}
function transferContribution(){if(!hasTransfer())return 0;const non=nonTransferPacks();if(!non.length)return 0;return non.some(p=>p.type==='premium')?15:10}
function used(){const non=nonTransferPacks().reduce((s,p)=>s+p.credits,0);return hasTransfer()&&!non.length?Number(booking?.credits||0):non}
function optionUsedAfterToggle(p){const temp=new Set(selected);if(temp.has(p.id)){temp.delete(p.id)}else{if(p.type==='transfer'){[...temp].forEach(id=>{if(packs.find(x=>x.id===id)?.type==='transfer')temp.delete(id)})}temp.add(p.id)}const old=selected;selected=temp;const val=used();selected=old;return val}
function packName(p){return packText[p.id][lang].n}function packDesc(p){return packText[p.id][lang].d}
function renderPacks(){if(!document.getElementById('packGrid'))return;packGrid.innerHTML='';if(!booking)return;packs.forEach(p=>{const projected=optionUsedAfterToggle(p);const disabled=!selected.has(p.id)&&projected>booking.credits;let badge=p.type==='transfer'?(selected.has(p.id)&&!nonTransferPacks().length?booking.credits:'') : p.credits;const div=document.createElement('div');div.className='pack '+(selected.has(p.id)?'selected ':'')+(disabled?'disabled':'');div.innerHTML=`${badge!==''?`<div class="credits">${badge}</div>`:''}<div class="icon">${icons[p.id]}</div><h3>${packName(p)}</h3><p class="desc">${packDesc(p)}</p>${p.confirm?`<div class="notice">${tr('transferRule')}</div>`:''}${p.type==='transfer'&&selected.has(p.id)&&transferContribution()>0?`<div class="money">${tr('extraDue')}: €${transferContribution()}</div>`:''}`;div.onclick=()=>{if(disabled){packMsg.textContent=tr('notEnough');packMsg.className='notice danger';return}if(selected.has(p.id)){selected.delete(p.id)}else{if(p.type==='transfer'){[...selected].forEach(id=>{if(packs.find(x=>x.id===id)?.type==='transfer')selected.delete(id)})}selected.add(p.id)}packMsg.className='notice hidden';renderPacks();renderCustom()};packGrid.appendChild(div)});walletAvailable.textContent=booking.credits;walletUsed.textContent=used();walletRemaining.textContent=booking.credits-used();extraDueValue.textContent=transferContribution();if(hasTransfer()){packMsg.textContent=tr('transferRule');packMsg.className='notice'}}
function renderCustom(){if(!document.getElementById('customFields'))return;customFields.innerHTML='';if(!selected.size){customFields.innerHTML=`<p class="desc">${tr('selectFirst')}</p>`;return}[...selected].forEach(id=>{const p=packs.find(x=>x.id===id);const box=document.createElement('div');box.innerHTML=`<h3>${packName(p)}</h3>`;p.fields.forEach((fieldKey,index)=>{const meta=options[fieldKey];const fid=`${id}__${fieldKey}__${index}`;const f=document.createElement('div');f.className='field';f.innerHTML=`<label>${meta[lang]}</label><select id="${fid}">${meta.opts[lang].map(o=>`<option>${o}</option>`).join('')}</select>`;box.appendChild(f);setTimeout(()=>{const el=document.getElementById(fid);if(el){prefs[fid]=el.value;el.onchange=()=>prefs[fid]=el.value}},0)});customFields.appendChild(box)})}
toPrefs.onclick=()=>{if(!selected.size){packMsg.textContent=tr('selectOne');packMsg.className='notice danger';return}go(4)};
function renderAllergies(){if(!document.getElementById('allergyBox'))return;allergyBox.innerHTML=allergies[lang].map(a=>`<label class="check"><input type="checkbox" value="${a}"> ${a}</label>`).join('')}
function renderSummary(){const sel=selectedPacks();summaryBox.innerHTML=`<div class="summary-line"><span>${tr('hello')}</span><b>${booking.guest}</b></div><div class="summary-line"><span>Credits</span><b>${used()} / ${booking.credits}</b></div><div class="summary-line"><span>${tr('extraDue')}</span><b>€ ${transferContribution()}</b></div>`+sel.map(p=>`<div class="summary-line"><span>${packName(p)}</span><b>${p.type==='transfer'?(transferContribution()?'+€'+transferContribution():booking.credits):p.credits}</b></div>`).join('')}
confirmBtn.onclick=async()=>{const allergiesSel=[...allergyBox.querySelectorAll('input:checked')].map(x=>x.value);const payload={bookingCode:booking.code,booking,selected:selectedPacks().map(p=>({id:p.id,name:packName(p),credits:p.type==='transfer'?(transferContribution()?0:booking.credits):p.credits,extraDue:transferContribution()})),extraDue:transferContribution(),preferences:prefs,allergies:allergiesSel,notes:notes.value,language:lang,timestamp:new Date().toISOString()};localStorage.setItem('2mhs_last_welcome',JSON.stringify(payload));try{await fetch(CONFIG.API_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}catch(e){console.warn(e)}go(5)};
translate();const q=new URLSearchParams(location.search);if(q.get('booking')){bookingCode.value=q.get('booking');load()}
</script>
